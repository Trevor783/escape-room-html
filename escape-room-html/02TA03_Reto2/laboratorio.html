<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Panel de Control
    </h1>
   
    <table border="2" cellspacing="5" cellpadding="10" width="10">

  <tr>
    <th>A</th>
    <th>B</th>
    <th>C</th>
    <th>D</th>
  </tr>

  <tr>
    <td rowspan="2">E,I</td>
    <td>F</td>
    <td colspan="2">G,H</td>
  </tr>


  <tr>
    <td>J</td>
    <td rowspan="2">K,O</td>
    <td>L</td>
  </tr>

  <tr>
    <td>M</td>
    <td>N</td>
    <td>P</td>
  </tr>
</table> <br>
     <h3> Horario de Laboratorio</h3>
<table border="1" cellspacing="0" cellpadding="10">

  <tr>
    <th>Hora</th>
    <th>Lunes</th>
    <th>Martes</th>
    <th>Miércoles</th>
  </tr>

  <!-- Fila 2 -->
  <tr>
    <td rowspan="2">8:00 - 10:00</td>
    <td>Matemáticas</td>
    <td colspan="2">Programación</td>
  </tr>

  <!-- Fila 3 -->
  <tr>
    <td>Inglés</td>
    <td rowspan="2">SQL</td>

  </tr>

  <!-- Fila 4 -->
  <tr>
    <td>10:00 - 12:00</td>

  </tr>

</html>
